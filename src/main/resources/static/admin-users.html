<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSG Electronic - Benutzerverwaltung</title>
    <link rel="icon" href="/favicon.png" type="image/png">
    <style>
        :root {
            --rsg-blue: #1c39bb;
            --rsg-blue-dark: #142f9b;
            --rsg-blue-deep: #10257d;
            --bg-main: #eef3f8;
            --bg-panel: rgba(255, 255, 255, 0.96);
            --text-main: #1f2f44;
            --text-soft: #5f6f82;
            --border-soft: #d9e2ec;
            --shadow-soft: 0 14px 34px rgba(16, 37, 125, 0.10);
            --shadow-strong: 0 24px 60px rgba(16, 37, 125, 0.18);
            --success: #1f8a4d;
            --danger: #c53b3b;
            --warning: #c56a18;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            color: var(--text-main);
            background:
                    radial-gradient(circle at top left, rgba(28, 57, 187, 0.10), transparent 24%),
                    radial-gradient(circle at top right, rgba(77, 100, 209, 0.14), transparent 22%),
                    linear-gradient(180deg, #f7f9fc 0%, #eef3f8 48%, #e7edf5 100%);
            min-height: 100vh;
        }

        .page {
            max-width: 1400px;
            margin: 0 auto;
            padding: 28px 20px 42px;
        }

        .hero {
            background: linear-gradient(135deg, rgba(16, 37, 125, 0.96), rgba(28, 57, 187, 0.92));
            border-radius: 28px;
            box-shadow: var(--shadow-strong);
            padding: 28px;
            color: white;
        }

        .hero h1 {
            margin: 0;
            font-size: 42px;
        }

        .hero p {
            margin: 10px 0 0;
            color: rgba(230,236,243,0.92);
        }

        .top-actions {
            margin-top: 18px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .top-link {
            display: inline-block;
            padding: 12px 16px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: bold;
            background: rgba(255,255,255,0.12);
            color: white;
            border: 1px solid rgba(255,255,255,0.14);
        }

        .panel {
            margin-top: 24px;
            background: var(--bg-panel);
            border: 1px solid rgba(255,255,255,0.44);
            border-radius: 26px;
            box-shadow: var(--shadow-soft);
            overflow: hidden;
        }

        .panel-header {
            padding: 22px 24px 14px;
            border-bottom: 1px solid rgba(16, 37, 125, 0.06);
        }

        .panel-header h2 {
            margin: 0;
            color: var(--rsg-blue-deep);
            font-size: 24px;
        }

        .panel-header p {
            margin: 6px 0 0;
            color: var(--text-soft);
        }

        .content {
            padding: 20px 24px 24px;
        }

        .message {
            display: none;
            margin-bottom: 16px;
            padding: 14px 16px;
            border-radius: 14px;
            font-weight: bold;
        }

        .message.success {
            background: rgba(31,138,77,0.10);
            color: var(--success);
            border: 1px solid rgba(31,138,77,0.18);
        }

        .message.error {
            background: rgba(197,59,59,0.10);
            color: var(--danger);
            border: 1px solid rgba(197,59,59,0.18);
        }

        .table-wrap {
            border-radius: 18px;
            border: 1px solid #dce5ef;
            background: #ffffff;
            overflow: hidden;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 980px;
        }

        th {
            background: linear-gradient(135deg, var(--rsg-blue-deep), var(--rsg-blue-dark));
            color: white;
            text-align: left;
            padding: 14px 16px;
            font-size: 14px;
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid #eef2f6;
            font-size: 14px;
            color: #223247;
            vertical-align: middle;
        }

        tr:nth-child(even) td {
            background: #fbfcfe;
        }

        .tag {
            display: inline-block;
            padding: 7px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: bold;
        }

        .pending {
            background: rgba(197,106,24,0.12);
            color: var(--warning);
        }

        .approved {
            background: rgba(31,138,77,0.10);
            color: var(--success);
        }

        .rejected {
            background: rgba(197,59,59,0.10);
            color: var(--danger);
        }

        .admin {
            background: rgba(28,57,187,0.10);
            color: var(--rsg-blue-dark);
        }

        .user {
            background: rgba(95,111,130,0.12);
            color: var(--text-soft);
        }

        .action-group {
            display: flex;
            gap: 8px;
        }

        .btn {
            border: none;
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-approve {
            background: rgba(31,138,77,0.10);
            color: var(--success);
            border: 1px solid rgba(31,138,77,0.18);
        }

        .btn-reject {
            background: rgba(197,59,59,0.10);
            color: var(--danger);
            border: 1px solid rgba(197,59,59,0.18);
        }
    </style>
</head>
<body>
<div class="page">
    <section class="hero">
        <h1>Benutzerverwaltung</h1>
        <p>Neue Registrierungen prüfen, Benutzer freigeben oder ablehnen.</p>

        <div class="top-actions">
            <a class="top-link" href="/">Zur Bauteilsuche</a>
            <a class="top-link" href="/logout">Abmelden</a>
        </div>
    </section>

    <section class="panel">
        <div class="panel-header">
            <h2>Registrierte Benutzer</h2>
            <p>Nur freigegebene Benutzer können sich anmelden.</p>
        </div>

        <div class="content">
            <div id="successBox" class="message success"></div>
            <div id="errorBox" class="message error"></div>

            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Benutzername</th>
                        <th>E-Mail</th>
                        <th>Rolle</th>
                        <th>Status</th>
                        <th>Erstellt</th>
                        <th>Aktion</th>
                    </tr>
                    </thead>
                    <tbody id="userTableBody">
                    <tr>
                        <td colspan="8">Lade Benutzer...</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</div>

<script>
    const tableBody = document.getElementById('userTableBody');
    const successBox = document.getElementById('successBox');
    const errorBox = document.getElementById('errorBox');

    function showSuccess(message) {
        successBox.textContent = message;
        successBox.style.display = 'block';
        errorBox.style.display = 'none';
    }

    function showError(message) {
        errorBox.textContent = message;
        errorBox.style.display = 'block';
        successBox.style.display = 'none';
    }

    function statusClass(status) {
        if (status === 'APPROVED') return 'approved';
        if (status === 'REJECTED') return 'rejected';
        return 'pending';
    }

    function roleClass(role) {
        if (role === 'ADMIN') return 'admin';
        return 'user';
    }

    async function loadUsers() {
        try {
            const response = await fetch('/api/admin/users');
            if (!response.ok) {
                throw new Error('Fehler beim Laden');
            }

            const users = await response.json();

            if (!users.length) {
                tableBody.innerHTML = '<tr><td colspan="8">Keine Benutzer gefunden.</td></tr>';
                return;
            }

            tableBody.innerHTML = users.map(user => `
                <tr>
                    <td>${user.id}</td>
                    <td>${escapeHtml(user.fullName || '')}</td>
                    <td>${escapeHtml(user.username || '')}</td>
                    <td>${escapeHtml(user.email || '')}</td>
                    <td><span class="tag ${roleClass(user.role)}">${user.role}</span></td>
                    <td><span class="tag ${statusClass(user.status)}">${user.status}</span></td>
                    <td>${escapeHtml(user.createdAt || '')}</td>
                    <td>
                        ${user.role === 'ADMIN' ? '-' : `
                            <div class="action-group">
                                <button class="btn btn-approve" onclick="approveUser(${user.id})">Freigeben</button>
                                <button class="btn btn-reject" onclick="rejectUser(${user.id})">Ablehnen</button>
                            </div>
                        `}
                    </td>
                </tr>
            `).join('');
        } catch (error) {
            tableBody.innerHTML = '<tr><td colspan="8">Benutzer konnten nicht geladen werden.</td></tr>';
            showError('Fehler beim Laden der Benutzerliste.');
        }
    }

    async function approveUser(id) {
        try {
            const response = await fetch(`/api/admin/users/${id}/approve`, {
                method: 'POST'
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.message || 'Freigabe fehlgeschlagen');
            }

            showSuccess(data.message || 'Benutzer freigegeben.');
            await loadUsers();
        } catch (error) {
            showError('Freigabe fehlgeschlagen.');
        }
    }

    async function rejectUser(id) {
        try {
            const response = await fetch(`/api/admin/users/${id}/reject`, {
                method: 'POST'
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.message || 'Ablehnung fehlgeschlagen');
            }

            showSuccess(data.message || 'Benutzer abgelehnt.');
            await loadUsers();
        } catch (error) {
            showError('Ablehnung fehlgeschlagen.');
        }
    }

    function escapeHtml(text) {
        return String(text)
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    loadUsers();
</script>
</body>
</html>
